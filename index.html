<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Readboard — Save Links Beautifully</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass-bg: rgba(255,255,255,0.08);
      --glass-border: rgba(255,255,255,0.18);
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.3);
      --accent: #e8b4f8;
      --accent2: #7dd3fc;
      --accent3: #fcd34d;
      --text: #f1f0f5;
      --muted: rgba(241,240,245,0.5);
      --danger: #f87171;
    }

    body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: #0d0d1a;
      overflow-x: hidden;
    }

    /* Animated mesh background */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(139,92,246,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 70% at 80% 80%, rgba(6,182,212,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(236,72,153,0.15) 0%, transparent 70%),
        #0d0d1a;
      animation: bgShift 12s ease-in-out infinite alternate;
    }
    @keyframes bgShift {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(30deg); }
    }

    /* Floating orbs */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0;
      animation: float 8s ease-in-out infinite alternate;
    }
    .orb1 { width: 400px; height: 400px; background: rgba(139,92,246,0.2); top: -100px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 300px; height: 300px; background: rgba(6,182,212,0.15); bottom: -80px; right: -60px; animation-delay: 3s; }
    .orb3 { width: 200px; height: 200px; background: rgba(236,72,153,0.18); top: 50%; left: 60%; animation-delay: 6s; }
    @keyframes float {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(30px, -40px) scale(1.1); }
    }

    /* Layout */
    .container {
      position: relative; z-index: 1;
      max-width: 900px; margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.8s ease both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    header .logo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header .tagline {
      margin-top: 8px;
      font-size: 0.95rem;
      color: var(--muted);
      font-style: italic;
      font-family: 'Playfair Display', serif;
    }
    .stats-row {
      display: flex; gap: 20px; justify-content: center; margin-top: 20px;
      flex-wrap: wrap;
    }
    .stat-pill {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      border-radius: 999px;
      padding: 6px 18px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .stat-pill span { color: var(--text); font-weight: 500; }

    /* Add Link Form */
    .add-form {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 28px 28px;
      box-shadow: var(--glass-shadow);
      margin-bottom: 36px;
      animation: fadeUp 0.8s 0.2s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .add-form h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 400;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .form-row {
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .form-row input, .form-row select {
      flex: 1; min-width: 140px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .form-row input::placeholder { color: var(--muted); }
    .form-row input:focus, .form-row select:focus {
      border-color: rgba(232,180,248,0.5);
      background: rgba(255,255,255,0.1);
    }
    .form-row select option { background: #1a1a2e; color: var(--text); }
    .add-btn {
      background: linear-gradient(135deg, rgba(139,92,246,0.7), rgba(6,182,212,0.5));
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 12px 24px;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    .add-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(139,92,246,0.4);
      background: linear-gradient(135deg, rgba(139,92,246,0.9), rgba(6,182,212,0.7));
    }
    .add-btn:active { transform: translateY(0); }

    /* Filter bar */
    .filter-bar {
      display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap;
      animation: fadeUp 0.8s 0.35s ease both;
    }
    .filter-btn {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      border-radius: 999px;
      padding: 8px 18px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: rgba(232,180,248,0.15);
      border-color: rgba(232,180,248,0.4);
      color: var(--accent);
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    /* Card */
    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--glass-shadow);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
      animation: cardIn 0.4s ease both;
      cursor: default;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
      opacity: 0;
      transition: opacity 0.25s;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
      border-color: rgba(255,255,255,0.28);
    }
    .card:hover::before { opacity: 1; }

    .card-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
    }
    .tag-article  { background: rgba(232,180,248,0.15); color: var(--accent); border: 1px solid rgba(232,180,248,0.3); }
    .tag-video    { background: rgba(248,180,180,0.15); color: #fca5a5; border: 1px solid rgba(248,180,180,0.3); }
    .tag-tool     { background: rgba(125,211,252,0.12); color: var(--accent2); border: 1px solid rgba(125,211,252,0.3); }
    .tag-research { background: rgba(252,211,77,0.12); color: var(--accent3); border: 1px solid rgba(252,211,77,0.3); }
    .tag-other    { background: rgba(255,255,255,0.08); color: var(--muted); border: 1px solid rgba(255,255,255,0.15); }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 8px;
      color: var(--text);
      word-break: break-word;
    }
    .card-url {
      font-size: 0.78rem;
      color: var(--muted);
      word-break: break-all;
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px;
    }
    .card-date {
      font-size: 0.73rem;
      color: var(--muted);
    }
    .card-actions { display: flex; gap: 8px; }
    .action-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.18s;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .action-btn:hover { background: rgba(255,255,255,0.13); color: var(--text); }
    .delete-btn:hover { background: rgba(248,113,113,0.15); border-color: rgba(248,113,113,0.3); color: var(--danger); }
    .read-btn:hover { background: rgba(125,211,252,0.12); border-color: rgba(125,211,252,0.3); color: var(--accent2); }

    /* Read overlay */
    .card.read-done { opacity: 0.5; }
    .card.read-done .card-title { text-decoration: line-through; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      animation: fadeUp 0.6s ease both;
    }
    .empty .icon { font-size: 3rem; margin-bottom: 16px; }
    .empty p { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; }
    .empty small { display: block; margin-top: 8px; font-size: 0.82rem; }

    /* Toast */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(30,20,60,0.85);
      border: 1px solid rgba(232,180,248,0.3);
      backdrop-filter: blur(20px);
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 0.85rem;
      color: var(--text);
      z-index: 100;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

    @media (max-width: 500px) {
      .form-row { flex-direction: column; }
      .add-btn { width: 100%; }
    }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="container">

  <header>
    <div class="logo">Readboard</div>
    <div class="tagline">your personal library, beautifully kept.</div>
    <div class="stats-row">
      <div class="stat-pill">📚 <span id="totalCount">0</span> saved</div>
      <div class="stat-pill">✅ <span id="readCount">0</span> read</div>
      <div class="stat-pill">⏳ <span id="unreadCount">0</span> to read</div>
    </div>
  </header>

  <div class="add-form">
    <h2>+ drop a link to save</h2>
    <div class="form-row">
      <input type="url" id="urlInput" placeholder="https://interesting-article.com" />
      <input type="text" id="titleInput" placeholder="Title (optional)" />
      <select id="tagSelect">
        <option value="article">📝 Article</option>
        <option value="video">🎬 Video</option>
        <option value="tool">🔧 Tool</option>
        <option value="research">🔬 Research</option>
        <option value="other">🌀 Other</option>
      </select>
      <button class="add-btn" onclick="addLink()">Save →</button>
    </div>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('unread', this)">Unread</button>
    <button class="filter-btn" onclick="setFilter('read', this)">Read</button>
    <button class="filter-btn" onclick="setFilter('article', this)">Articles</button>
    <button class="filter-btn" onclick="setFilter('video', this)">Videos</button>
    <button class="filter-btn" onclick="setFilter('tool', this)">Tools</button>
    <button class="filter-btn" onclick="setFilter('research', this)">Research</button>
  </div>

  <div class="grid" id="grid"></div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ── Data ──────────────────────────────────────────────────────────────────
  let links = JSON.parse(localStorage.getItem('readboard_links') || '[]');
  let currentFilter = 'all';

  // Seed with a few demo items if empty
  if (links.length === 0) {
    links = [
      { id: 1, url: 'https://developer.mozilla.org/en-US/', title: 'MDN Web Docs', tag: 'tool', read: false, date: '2026-03-07' },
      { id: 2, url: 'https://css-tricks.com/glassmorphism-in-css/', title: 'Glassmorphism in CSS', tag: 'article', read: false, date: '2026-03-07' },
      { id: 3, url: 'https://web.dev/learn/', title: 'Learn Web Dev — web.dev', tag: 'research', read: true, date: '2026-03-06' },
    ];
    save();
  }

  function save() {
    localStorage.setItem('readboard_links', JSON.stringify(links));
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function render() {
    const grid = document.getElementById('grid');
    let filtered = links;
    if (currentFilter === 'unread') filtered = links.filter(l => !l.read);
    else if (currentFilter === 'read')   filtered = links.filter(l => l.read);
    else if (['article','video','tool','research','other'].includes(currentFilter))
      filtered = links.filter(l => l.tag === currentFilter);

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty" style="grid-column:1/-1">
          <div class="icon">🌙</div>
          <p>Nothing here yet.</p>
          <small>Add a link above to get started.</small>
        </div>`;
    } else {
      grid.innerHTML = filtered.map(link => `
        <div class="card ${link.read ? 'read-done' : ''}" id="card-${link.id}">
          <span class="card-tag tag-${link.tag}">${tagLabel(link.tag)}</span>
          <div class="card-title">${escHtml(link.title)}</div>
          <div class="card-url">${escHtml(link.url)}</div>
          <div class="card-footer">
            <span class="card-date">${link.date}</span>
            <div class="card-actions">
              <a class="action-btn read-btn" href="${escHtml(link.url)}" target="_blank" rel="noopener">↗ Open</a>
              <button class="action-btn read-btn" onclick="toggleRead(${link.id})">
                ${link.read ? '↩ Unread' : '✓ Read'}
              </button>
              <button class="action-btn delete-btn" onclick="deleteLink(${link.id})">✕</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Stats
    document.getElementById('totalCount').textContent  = links.length;
    document.getElementById('readCount').textContent   = links.filter(l => l.read).length;
    document.getElementById('unreadCount').textContent = links.filter(l => !l.read).length;
  }

  // ── Actions ───────────────────────────────────────────────────────────────
  function addLink() {
    const urlEl   = document.getElementById('urlInput');
    const titleEl = document.getElementById('titleInput');
    const tagEl   = document.getElementById('tagSelect');
    let url = urlEl.value.trim();
    if (!url) { toast('Please enter a URL 🔗'); urlEl.focus(); return; }
    if (!url.startsWith('http')) url = 'https://' + url;

    const title = titleEl.value.trim() || url.replace(/^https?:\/\/(www\.)?/, '').split('/')[0];
    const newLink = {
      id: Date.now(),
      url,
      title,
      tag: tagEl.value,
      read: false,
      date: new Date().toISOString().slice(0,10)
    };
    links.unshift(newLink);
    save(); render();
    urlEl.value = ''; titleEl.value = '';
    toast('Saved to your board ✨');
  }

  function deleteLink(id) {
    links = links.filter(l => l.id !== id);
    save(); render();
    toast('Removed 🗑');
  }

  function toggleRead(id) {
    const l = links.find(l => l.id === id);
    if (l) { l.read = !l.read; save(); render(); }
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  // ── Enter key shortcut ────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (document.activeElement.id === 'urlInput' || document.activeElement.id === 'titleInput'))
      addLink();
  });

  // ── Helpers ───────────────────────────────────────────────────────────────
  function tagLabel(tag) {
    return { article:'📝 Article', video:'🎬 Video', tool:'🔧 Tool', research:'🔬 Research', other:'🌀 Other' }[tag] || tag;
  }
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
